<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HELLOWEEN 🎃</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Tahoma, sans-serif;
            background-image: url('your-image.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            padding: 20px;
            color: #fff;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(45, 27, 62, 0.7);
            z-index: -1;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        /* ===== اللوجو الدائري ===== */
        .profile-wrapper {
            position: relative;
            width: 220px;
            height: 220px;
            margin: 30px auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* الحلقة الخارجية الدوارة */
        .profile-ring {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: conic-gradient(
                from 0deg,
                #ff6b35,
                #f7931e,
                #ffcc00,
                #ff6b35,
                #ff3300,
                #ff6b35
            );
            animation: ringRotate 4s linear infinite;
            padding: 4px;
        }

        .profile-ring::before {
            content: '';
            position: absolute;
            inset: 4px;
            border-radius: 50%;
            background: rgba(45, 27, 62, 0.9);
        }

        @keyframes ringRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* الصورة الدائرية */
        .profile-pic {
            position: relative;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            overflow: hidden;
            z-index: 2;
            border: 4px solid #ff6b35;
            box-shadow: 
                0 0 30px rgba(255, 107, 53, 0.6),
                0 0 60px rgba(255, 107, 53, 0.4),
                inset 0 0 20px rgba(255, 107, 53, 0.3);
            animation: 
                float 3s ease-in-out infinite,
                glowPulse 2s ease-in-out infinite alternate;
        }

        .profile-pic img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            display: block;
        }

        /* تأثير اللمعان على الصورة */
        .profile-pic::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                45deg,
                transparent 40%,
                rgba(255, 255, 255, 0.3) 50%,
                transparent 60%
            );
            animation: shine 3s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        @keyframes glowPulse {
            from {
                box-shadow: 
                    0 0 20px rgba(255, 107, 53, 0.5),
                    0 0 40px rgba(255, 107, 53, 0.3),
                    inset 0 0 20px rgba(255, 107, 53, 0.2);
            }
            to {
                box-shadow: 
                    0 0 40px rgba(255, 107, 53, 0.9),
                    0 0 80px rgba(255, 107, 53, 0.6),
                    0 0 100px rgba(255, 107, 53, 0.4),
                    inset 0 0 30px rgba(255, 107, 53, 0.5);
            }
        }

        @keyframes shine {
            0% {
                transform: translateX(-100%) rotate(45deg);
            }
            100% {
                transform: translateX(100%) rotate(45deg);
            }
        }

        /* جسيمات متحركة حول الصورة */
        .particle {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #ff6b35;
            box-shadow: 0 0 10px #ff6b35;
            animation: particleOrbit 3s linear infinite;
        }

        .particle:nth-child(1) { animation-delay: 0s; }
        .particle:nth-child(2) { animation-delay: 0.75s; }
        .particle:nth-child(3) { animation-delay: 1.5s; }
        .particle:nth-child(4) { animation-delay: 2.25s; }

        @keyframes particleOrbit {
            0% {
                transform: rotate(0deg) translateX(120px) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: rotate(360deg) translateX(120px) rotate(-360deg);
                opacity: 0;
            }
        }

        .username {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 25px;
            color: #ff6b35;
            text-shadow: 0 0 10px rgba(255, 107, 53, 0.5), 
                         2px 2px 4px rgba(0, 0, 0, 0.8);
            animation: textGlow 2s ease-in-out infinite alternate;
        }

        @keyframes textGlow {
            from {
                text-shadow: 0 0 10px rgba(255, 107, 53, 0.5), 
                             2px 2px 4px rgba(0, 0, 0, 0.8);
            }
            to {
                text-shadow: 0 0 20px rgba(255, 107, 53, 0.8), 
                             0 0 30px rgba(255, 107, 53, 0.6),
                             2px 2px 4px rgba(0, 0, 0, 0.8);
            }
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .social-icons a {
            width: 45px;
            height: 45px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            border: 2px solid rgba(255, 107, 53, 0.5);
            backdrop-filter: blur(10px);
            animation: iconFloat 3s ease-in-out infinite;
        }

        .social-icons a:nth-child(1) { animation-delay: 0s; }
        .social-icons a:nth-child(2) { animation-delay: 0.2s; }
        .social-icons a:nth-child(3) { animation-delay: 0.4s; }
        .social-icons a:nth-child(4) { animation-delay: 0.6s; }

        @keyframes iconFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
        }

        .social-icons a:hover {
            transform: scale(1.1) translateY(-5px);
            background: rgba(255, 107, 53, 0.3);
        }

        .social-icons svg {
            width: 24px;
            height: 24px;
            fill: #ff6b35;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .link-btn {
            background: linear-gradient(135deg, #ff6b35 0%, #f7931e 100%);
            border-radius: 50px;
            padding: 18px 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-decoration: none;
            color: #fff;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(255, 107, 53, 0.4);
            backdrop-filter: blur(10px);
        }

        .link-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(255, 107, 53, 0.6);
        }

        .btn-content {
            display: flex;
            align-items: center;
            gap: 15px;
            flex: 1;
        }

        .btn-icon {
            width: 32px;
            height: 32px;
        }

        .btn-icon svg {
            width: 28px;
            height: 28px;
            fill: #fff;
        }

        .btn-text {
            flex: 1;
            text-align: center;
        }

        .dots {
            color: rgba(255, 255, 255, 0.7);
            font-size: 20px;
        }

        @media (max-width: 480px) {
            .profile-wrapper {
                width: 180px;
                height: 180px;
            }

            .profile-pic {
                width: 160px;
                height: 160px;
            }

            .username {
                font-size: 26px;
            }

            .link-btn {
                padding: 15px 20px;
                font-size: 15px;
            }

            @keyframes particleOrbit {
                0% {
                    transform: rotate(0deg) translateX(100px) rotate(0deg);
                    opacity: 0;
                }
                100% {
                    transform: rotate(360deg) translateX(100px) rotate(-360deg);
                    opacity: 0;
                }
            }
        }
    </style>
</head>

    <script>
        // تأثير حركي عند تحميل الصفحة
        window.addEventListener('load', function() {
            const elements = document.querySelectorAll('.profile-wrapper, .username, .social-icons, .link-btn');
            
            elements.forEach(function(element, index) {
                element.style.opacity = '0';
                element.style.transform = 'translateY(20px)';
                
                setTimeout(function() {
                    element.style.transition = 'all 0.5s ease';
                    element.style.opacity = '1';
                    element.style.transform = 'translateY(0)';
                }, index * 100);
            });
        });

        // تأثير عند الضغط على الأزرار
        const buttons = document.querySelectorAll('.link-btn');

        buttons.forEach(function(button) {
            button.addEventListener('mousedown', function() {
                this.style.transform = 'scale(0.95)';
            });
            
            button.addEventListener('mouseup', function() {
                this.style.transform = 'translateY(-3px)';
            });
            
            button.addEventListener('mouseleave', function() {
                this.style.transform = 'translateY(0)';
            });
        });
    </script>
